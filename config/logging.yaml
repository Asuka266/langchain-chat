# config/logging.yaml —— 日志配置
version: 1

formatters:
  console:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    (): core.json_formatter.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: console
    stream: ext://sys.stderr
  file:
    class: logging.handlers.TimedRotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/app.log
    when: midnight
    backupCount: 7
    encoding: utf8

root:
  level: DEBUG
  handlers: [console, file]

loggers:
  urllib3:
    level: WARNING
  asyncio:
    level: WARNING
